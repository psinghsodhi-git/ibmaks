name: "Pushpendra - AKS Deployment Pipeline with GitHub Actions"

on:
  push:
  workflow_dispatch:

env:
  TF_LOG: INFO
  KUBECONFIG: D:\yml\.kube\config

jobs:
  aks:
    name: "AKS Pipeline"
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify kubeconfig
        run: |
          echo $env:KUBECONFIG
          kubectl config get-contexts

      - name: K8s Control Apply
        run: |
          kubectl apply -f pyweb.yml
